<div>
  <h1>{{ colourName }}</h1>
  <app-colour-picker></app-colour-picker>
  <button class="button" (click)="checkColour()" [disabled]="hasPlayedToday()">Submit</button>

  <app-score-modal
    [show]="showModal()"
    [score]="score()"
    [hueScore]="hueScore()"
    [saturationScore]="saturationScore()"
    [lightnessScore]="lightnessScore()"
    (close)="closeModal()">
  </app-score-modal>
</div>
